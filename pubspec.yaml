name: thimar
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.3
  cached_network_image: ^3.4.1
  lottie: ^3.3.1
  flutter_screenutil: ^5.9.3
  animate_do: ^4.2.0
  pin_code_fields: ^8.0.1
  circular_countdown_timer: ^0.2.4
  dio: ^5.9.1
  flutter_bloc: ^9.1.1
  shared_preferences: ^2.5.3
  carousel_slider: ^5.1.2
  skeletonizer: ^2.1.3
  curved_navigation_bar: ^1.0.6
  device_preview: ^1.3.1
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lotties/

  fonts:
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
          weight: 400
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700
